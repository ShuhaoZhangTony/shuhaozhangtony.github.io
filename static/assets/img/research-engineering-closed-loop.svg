<svg viewBox="20 5 770 540" xmlns="http://www.w3.org/2000/svg" style="font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#22c55e"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/></marker>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">科研-工程 闭环协作模型</text>

  <!-- Background ring -->
  <circle cx="410" cy="260" r="155" fill="none" stroke="#f1f5f9" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Gate diamond -->
  <polygon points="410,88 424,100 410,112 396,100" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5"/>
  <text x="410" y="104" text-anchor="middle" font-size="8" font-weight="700" fill="#dc2626">门控</text>
  <text x="456" y="88" font-size="8" fill="#dc2626">不相关→驳回/找导师</text>

  <!-- ═══ OUTER RING ARCS ═══ -->

  <!-- PI → Academic (top-right quarter) -->
  <path d="M 418 105 A 155 155 0 0 1 563 270" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#a1)"/>
  <text x="510" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">科研指导</text>

  <!-- Academic → Gate → Eng Students (through gate) -->
  <path d="M 530 228 L 426 102" fill="none" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a5)"/>
  <path d="M 396 102 L 270 228" fill="none" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a3)"/>
  <text x="335" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">提出工程需求</text>

  <!-- Eng Students → PI (top-left quarter) -->
  <path d="M 257 228 A 155 155 0 0 1 393 108" fill="none" stroke="#22c55e" stroke-width="2.5" marker-end="url(#a1)"/>
  <text x="280" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#22c55e">项目工程落地贡献</text>

  <!-- Engineer → Eng Students (bottom-left quarter) -->
  <path d="M 365 408 A 155 155 0 0 1 248 280" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#a3)"/>
  <text x="245" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">工程指导</text>
  <text x="245" y="394" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">· 任务安排</text>

  <!-- Academic → Engineer (right side, dashed blue): Idea落地化需求 -->
  <path d="M 565 295 Q 595 348 480 398" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#a4)"/>
  <text x="590" y="352" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6">Idea落地化需求</text>

  <!-- ═══ WIDE OUTER ARCS (PI ↔ Engineer) ═══ -->

  <!-- PI → Engineer (wide left curve) -->
  <path d="M 335 82 Q 85 260 340 395" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#a4)"/>
  <text x="108" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">项目任务安排</text>

  <!-- Engineer → PI (wide right curve) -->
  <path d="M 485 395 Q 735 260 480 82" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#a1)"/>
  <text x="712" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">项目进展反馈</text>

  <!-- ═══ INNER DASHED PATHS ═══ -->

  <!-- Eng Students → Academic (upper inner): 完成研究需求 -->
  <path d="M 290 230 Q 410 192 530 230" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#a2)"/>
  <text x="410" y="208" text-anchor="middle" font-size="9" fill="#22c55e">完成研究需求</text>

  <!-- Academic → Eng Students (lower inner): 发表学术成果 -->
  <path d="M 530 288 Q 410 362 290 288" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#a3)"/>
  <text x="410" y="352" text-anchor="middle" font-size="9" fill="#3b82f6">发表学术成果（工程同学共同署名）</text>

  <!-- Eng Students → Engineer (inner left): 工程贡献 -->
  <path d="M 252 290 Q 278 348 370 398" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#a4)"/>
  <text x="272" y="345" text-anchor="middle" font-size="9" fill="#22c55e">工程贡献</text>

  <!-- Academic ↔ Eng Students (middle inner): 可互相转化 -->
  <path d="M 525 278 Q 410 314 295 278" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#a3)"/>
  <path d="M 295 278 Q 410 314 525 278" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#a2)"/>
  <rect x="358" y="298" width="104" height="18" rx="4" fill="#f1f5f9"/>
  <text x="410" y="311" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">可互相转化</text>

  <!-- ═══ NODES ═══ -->

  <!-- PI (top) -->
  <rect x="335" y="42" width="150" height="62" rx="14" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-width="2"/>
  <text x="410" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">PI / 导师</text>
  <text x="410" y="82" text-anchor="middle" font-size="9" fill="#7c3aed">方向把控 · 争议裁决</text>

  <!-- Academic (right) -->
  <rect x="498" y="222" width="140" height="72" rx="14" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="2"/>
  <text x="568" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#3b82f6">学术路线同学</text>
  <text x="568" y="258" text-anchor="middle" font-size="9" fill="#3b82f6">Academic Track</text>
  <text x="568" y="274" text-anchor="middle" font-size="8" font-style="italic" fill="#3b82f6">侧重科研训练</text>

  <!-- Engineering (left) -->
  <rect x="182" y="222" width="140" height="72" rx="14" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="2"/>
  <text x="252" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#22c55e">工程路线同学</text>
  <text x="252" y="258" text-anchor="middle" font-size="9" fill="#22c55e">Engineering Track</text>
  <text x="252" y="274" text-anchor="middle" font-size="8" font-style="italic" fill="#22c55e">侧重工程训练</text>

  <!-- Engineer (bottom) -->
  <rect x="335" y="392" width="150" height="72" rx="14" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="410" y="414" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">工程师</text>
  <text x="410" y="432" text-anchor="middle" font-size="9" fill="#d97706">工程质量保障</text>
  <text x="410" y="448" text-anchor="middle" font-size="8" fill="#d97706">指导 · 任务安排 · 协调</text>

  <!-- ═══ OUTCOMES ═══ -->
  <rect x="110" y="490" width="600" height="48" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1" opacity="0.6"/>
  <text x="410" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">闭环成果</text>
  <circle cx="155" cy="526" r="4" fill="#22c55e"/>
  <text x="165" y="530" font-size="10" fill="#22c55e">工程同学有机会发表论文</text>
  <circle cx="380" cy="526" r="4" fill="#3b82f6"/>
  <text x="390" y="530" font-size="10" fill="#3b82f6">学术同学获得工程助力</text>
  <circle cx="590" cy="526" r="4" fill="#7c3aed"/>
  <text x="600" y="530" font-size="10" fill="#7c3aed">论文+项目双丰收</text>
</svg>
