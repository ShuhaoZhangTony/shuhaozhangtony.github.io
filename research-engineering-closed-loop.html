<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>科研-工程 闭环协作模型</title>
<style>
  body { background: #fff; margin: 0; font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif; display: flex; justify-content: center; padding: 24px; }
  svg { max-width: 860px; width: 100%; }
</style>
</head>
<body>
<svg viewBox="0 0 850 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#22c55e"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/></marker>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">科研-工程 闭环协作模型</text>

  <!-- Background ring -->
  <circle cx="410" cy="280" r="170" fill="none" stroke="#f1f5f9" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Gate diamond (above ring, clear of PI node) -->
  <polygon points="410,93 426,107 410,121 394,107" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5"/>
  <text x="410" y="111" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">门控</text>
  <text x="462" y="95" font-size="9" fill="#dc2626">不相关→驳回/找导师</text>

  <!-- ═══ OUTER RING ARCS ═══ -->

  <!-- PI → Academic (top-right quarter) -->
  <path d="M 420 111 A 170 170 0 0 1 578 290" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#a1)"/>
  <text x="515" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">科研指导</text>

  <!-- Academic → Gate → Eng Students (through gate) -->
  <path d="M 545 245 L 428 109" fill="none" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a5)"/>
  <path d="M 394 109 L 265 245" fill="none" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a3)"/>
  <text x="330" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#3b82f6">提出工程需求</text>

  <!-- Eng Students → PI (top-left quarter) -->
  <path d="M 252 245 A 170 170 0 0 1 391 114" fill="none" stroke="#22c55e" stroke-width="2.5" marker-end="url(#a1)"/>
  <text x="275" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#22c55e">项目工程落地贡献</text>

  <!-- Engineer → Eng Students (bottom-left quarter) -->
  <path d="M 361 442 A 170 170 0 0 1 242 300" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#a3)"/>
  <text x="240" y="405" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">工程指导</text>
  <text x="240" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">· 任务安排</text>

  <!-- Academic → Engineer (right side, dashed blue): Idea落地化需求 -->
  <path d="M 580 318 Q 620 375 490 428" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#a4)"/>
  <text x="610" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Idea落地化需求</text>

  <!-- ═══ WIDE OUTER ARCS (PI ↔ Engineer) ═══ -->

  <!-- PI → Engineer (wide left curve, outside the ring) -->
  <path d="M 335 90 Q 50 280 340 420" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="8 4" marker-end="url(#a4)"/>
  <text x="80" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">项目任务安排</text>

  <!-- Engineer → PI (wide right curve, outside the ring) -->
  <path d="M 485 420 Q 770 280 480 90" fill="none" stroke="#d97706" stroke-width="2.5" stroke-dasharray="8 4" marker-end="url(#a1)"/>
  <text x="745" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">项目进展反馈</text>

  <!-- ═══ INNER DASHED PATHS ═══ -->

  <!-- Eng Students → Academic (upper inner): 完成研究需求 -->
  <path d="M 290 248 Q 410 205 530 248" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#a2)"/>
  <text x="410" y="220" text-anchor="middle" font-size="10" fill="#22c55e">完成研究需求</text>

  <!-- Academic → Eng Students (lower inner): 发表学术成果 -->
  <path d="M 530 308 Q 410 390 290 308" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#a3)"/>
  <text x="410" y="378" text-anchor="middle" font-size="10" fill="#3b82f6">发表学术成果（工程同学共同署名）</text>

  <!-- Eng Students → Engineer (inner left): 工程贡献 -->
  <path d="M 250 310 Q 280 375 370 425" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#a4)"/>
  <text x="270" y="370" text-anchor="middle" font-size="10" fill="#22c55e">工程贡献</text>

  <!-- Academic ↔ Eng Students (middle inner): 可互相转化 -->
  <path d="M 525 298 Q 410 338 295 298" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#a3)"/>
  <path d="M 295 298 Q 410 338 525 298" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#a2)"/>
  <rect x="358" y="320" width="104" height="20" rx="4" fill="#f1f5f9"/>
  <text x="410" y="334" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">可互相转化</text>

  <!-- ═══ NODES ═══ -->

  <!-- PI (top) -->
  <rect x="335" y="48" width="150" height="68" rx="14" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-width="2"/>
  <text x="410" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">PI / 导师</text>
  <text x="410" y="92" text-anchor="middle" font-size="10" fill="#7c3aed">方向把控 · 争议裁决</text>

  <!-- Academic (right) -->
  <rect x="505" y="240" width="150" height="78" rx="14" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="2"/>
  <text x="580" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">学术路线同学</text>
  <text x="580" y="280" text-anchor="middle" font-size="10" fill="#3b82f6">Academic Track</text>
  <text x="580" y="298" text-anchor="middle" font-size="9" font-style="italic" fill="#3b82f6">侧重科研训练</text>

  <!-- Engineering (left) -->
  <rect x="165" y="240" width="150" height="78" rx="14" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#22c55e">工程路线同学</text>
  <text x="240" y="280" text-anchor="middle" font-size="10" fill="#22c55e">Engineering Track</text>
  <text x="240" y="298" text-anchor="middle" font-size="9" font-style="italic" fill="#22c55e">侧重工程训练</text>

  <!-- Engineer (bottom) -->
  <rect x="335" y="420" width="150" height="78" rx="14" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="410" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">工程师</text>
  <text x="410" y="465" text-anchor="middle" font-size="10" fill="#d97706">工程质量保障</text>
  <text x="410" y="483" text-anchor="middle" font-size="9" fill="#d97706">指导 · 任务安排 · 协调</text>

  <!-- ═══ OUTCOMES ═══ -->
  <rect x="110" y="545" width="600" height="80" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1" opacity="0.6"/>
  <text x="410" y="570" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">闭环成果</text>
  <circle cx="140" cy="600" r="5" fill="#22c55e"/>
  <text x="152" y="604" font-size="11" fill="#22c55e">工程同学有机会发表论文</text>
  <circle cx="390" cy="600" r="5" fill="#3b82f6"/>
  <text x="402" y="604" font-size="11" fill="#3b82f6">学术同学获得工程助力</text>
  <circle cx="610" cy="600" r="5" fill="#7c3aed"/>
  <text x="622" y="604" font-size="11" fill="#7c3aed">论文+项目双丰收</text>
</svg>
</body>
</html>
